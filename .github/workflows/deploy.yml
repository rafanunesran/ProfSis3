name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Muda para "master" se a sua branch principal tiver esse nome
  workflow_dispatch:

# ESTAS SÃO AS PERMISSÕES QUE CORRIGEM O ERRO 401
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 (historico completo) - necessario para "git rev-list --count HEAD"
          # no passo de build do APK Android gerar um versionCode sempre crescente de verdade
          # (um clone raso sempre contaria 1 commit).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build & sign extension (CRX3 + update.xml)
        env:
          EXT_SIGNING_KEY_B64: ${{ secrets.EXTENSION_SIGNING_KEY_B64 }}
        run: |
          if [ -z "$EXT_SIGNING_KEY_B64" ]; then
            echo "EXTENSION_SIGNING_KEY_B64 secret não configurado - pulando build da extensão."
            exit 0
          fi
          mkdir -p extensao-profsis/dist
          echo "$EXT_SIGNING_KEY_B64" | base64 -d > "$RUNNER_TEMP/key.pem"
          npx --yes crx3 extensao-profsis \
            --key "$RUNNER_TEMP/key.pem" \
            --crx extensao-profsis/dist/profsis3-extension.crx \
            --xml extensao-profsis/dist/update.xml \
            --crxURL "https://rafanunesran.github.io/ProfSis3/extensao-profsis/dist/profsis3-extension.crx"
          rm -f "$RUNNER_TEMP/key.pem"

      - name: Build single-file installer (.bat)
        shell: pwsh
        run: |
          $ps1Path = "extensao-profsis/installer/instalar_profsis3.ps1"
          $scriptText = Get-Content $ps1Path -Raw
          $bytes = [System.Text.Encoding]::Unicode.GetBytes($scriptText)
          $encoded = [Convert]::ToBase64String($bytes)
          New-Item -ItemType Directory -Force -Path extensao-profsis/dist | Out-Null
          # A chave HKCU\Software\Policies so aceita escrita de processos elevados (Administradores) no
          # Windows moderno, mesmo em contas sem dominio/gestao central - por isso o .bat se auto-eleva
          # via UAC (net session falha se nao estiver elevado) antes de rodar o instalador de verdade.
          $batContent = "@echo off`r`nnet session >nul 2>&1`r`nif %errorLevel% neq 0 (`r`n    echo Solicitando permissao de administrador...`r`n    powershell -Command `"Start-Process -FilePath '%~f0' -Verb RunAs`"`r`n    exit /b`r`n)`r`nchcp 65001 >nul`r`ntitle Instalador ProfSis3`r`npowershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $encoded`r`npause`r`n"
          Set-Content -Path extensao-profsis/dist/instalar_profsis3.bat -Value $batContent -NoNewline -Encoding ascii

      - name: Setup JDK (para o app Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
        continue-on-error: true

      # Builda o APK do app-android/ e coloca em app-android/dist/, para ser servido pelo
      # GitHub Pages no MESMO domínio do site (evita o problema de download cross-origin
      # que o link direto para GitHub Releases tinha em navegadores mobile mais simples,
      # ex: Lemur Browser - o download "abria uma página do GitHub" e travava no meio).
      # continue-on-error: se o build do APK falhar por qualquer motivo, o site continua
      # sendo publicado normalmente (só sem atualizar o APK desta vez) - nunca deve
      # bloquear o deploy da extensão, que é a parte crítica em produção.
      - name: Build APK do app Android
        continue-on-error: true
        run: |
          (
            VERSION_CODE=$(git rev-list --count HEAD)
            VERSION_NAME="1.0.$VERSION_CODE"
            cd app-android
            npm ci
            npm run cap:sync
            chmod +x android/gradlew
            (cd android && ./gradlew assembleDebug \
              -PPROFSIS_VERSION_CODE="$VERSION_CODE" \
              -PPROFSIS_VERSION_NAME="$VERSION_NAME")
            mkdir -p dist
            cp android/app/build/outputs/apk/debug/app-debug.apk dist/profsis3-sed-debug.apk
            # version.json e checado pelo UpdateChecker (com.profsis3.sed.update) a cada
            # abertura do app, pra saber se ha uma versao mais nova pra baixar sozinho.
            printf '{"versionCode": %s, "versionName": "%s", "apkUrl": "https://rafanunesran.github.io/ProfSis3/app-android/dist/profsis3-sed-debug.apk"}\n' \
              "$VERSION_CODE" "$VERSION_NAME" > dist/version.json
          ) || echo "Build do APK Android falhou - publicando o site sem atualizar o APK desta vez."
          # node_modules/ e as pastas de build do Gradle não devem ir pro Pages (path: '.' abaixo
          # sobe o repo inteiro) - limpa sempre, mesmo se o build acima falhou.
          rm -rf app-android/node_modules \
                 app-android/android/.gradle \
                 app-android/android/build \
                 app-android/android/app/build \
                 app-android/android/capacitor-cordova-android-plugins

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
