# Referência de configuração para publicar o servidor de IA (proxy) + RPA no Render.
# Ajuste o nome e crie as variáveis no painel (as marcadas sync:false não vão para o Git).
services:
  - type: web
    name: profsis-ia
    runtime: node
    rootDir: backend-rpa
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/ia-health
    envVars:
      - key: IA_API_KEYS      # chave(s) do Gemini/OpenAI/Groq/Nvidia separadas por vírgula
        sync: false
      - key: ALLOWED_ORIGIN   # ex.: https://rafanunesran.github.io
        sync: false
      - key: IA_PROXY_TOKEN   # opcional (anti-abuso); igual ao campo no painel Super Admin
        sync: false
